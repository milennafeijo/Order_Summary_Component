<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">

  <title>Frontend Mentor | Order summary card</title>

  <link rel="stylesheet" href="./css/reset.css">
  <link rel="stylesheet" href="./css/style.css">

</head>

<body>

  <main>
    <img src="./images/illustration-hero.svg" alt="Ilustração pessoa ouvindo música">

    <section>
      <h1>Order Summary</h1>
      <span class="description">You can now listen to million of songs, audiobooks and podcasts on any device anywhere
        you like!</span>


      <div class="informations">
        <div class="music-price">
          <img src="./images/icon-music.svg" alt="Ícone de música">

          <div class="price">

            <strong>Annual Plan</strong>
            <span>$59.99/year</span>
          </div>
        </div>

        <a href="#">Change</a>

      </div>

      <button><a href="#">Proceed to Payment</a></button>
      <a href="#" class="cancel-order">Cancel Order</a>

    </section>

  </main>

</body>

</html>
